<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Line Rider</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #eee; }
    #app {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
    }
    #toolbar {
      height: 40px;
      background: #333;
      display: flex;
      align-items: center;
      padding: 0 8px;
      gap: 6px;
      flex-shrink: 0;
      z-index: 10;
    }
    #toolbar button {
      padding: 4px 10px;
      border: 1px solid #555;
      background: #444;
      color: #ddd;
      cursor: pointer;
      border-radius: 3px;
      font-size: 13px;
      font-family: monospace;
    }
    #toolbar button:hover { background: #555; }
    #toolbar button.active { background: #0074d9; border-color: #0074d9; color: #fff; }
    #toolbar .separator {
      width: 1px; height: 24px; background: #555; margin: 0 4px;
    }
    #canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #hud {
      position: absolute;
      top: 4px; right: 8px;
      color: #666;
      font: 12px monospace;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar"></div>
    <div id="canvas-container">
      <canvas id="canvas"></canvas>
      <div id="hud"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
